---

- name: Copy pip config
  become: yes
  ansible.builtin.copy:
    src: pip.conf
    dest: /etc/

- name: Copy systemd service files
  become: yes
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/systemd/system/
  loop:
    - "fiber-core.service"

- name: Enable and start fiber-core service
  become: yes
  ansible.builtin.service:
    name: fiber-core
    enabled: yes
    state: started

- name: Create /etc/fiber folder
  become: yes
  ansible.builtin.file:
    path: /etc/fiber
    state: directory
    owner: root

- name: Create /var/fiber folder
  become: yes
  ansible.builtin.file:
    path: /var/fiber
    state: directory
    owner: root

- name: Copy FIBER config file
  ansible.builtin.copy:
    src: "/app/config/config.yaml"
    dest: /etc/fiber/config.yaml

