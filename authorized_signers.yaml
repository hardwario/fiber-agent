# Authorized Signers Registry for EU MDR-Compliant Remote Configuration
# This file contains public keys for doctors/pharmacists authorized to remotely
# change alarm thresholds and other critical configurations.

version: 1

# How to add a new authorized signer:
# 1. Generate Ed25519 keypair on secure workstation:
#    openssl genpkey -algorithm Ed25519 -out dr_name_private.pem
#    openssl pkey -in dr_name_private.pem -pubout -out dr_name_public.pem
#
# 2. Extract public key as hex:
#    openssl pkey -in dr_name_public.pem -pubin -outform DER | tail -c 32 | xxd -p -c 64
#
# 3. Add entry below with signer details
#
# 4. Device will automatically hot-reload within 10 seconds (no restart needed)
#
# 5. Store private key securely (hardware token, encrypted keystore, or hospital key management system)

authorized_signers: []
  # Example entry (REMOVE THIS BEFORE PRODUCTION):
  #
  # - signer_id: dr.jane.smith@hospital.eu
  #   full_name: Dr. Jane Smith
  #   role: Physician
  #   medical_license: MD-12345-CA
  #   permissions:
  #     - set_threshold
  #     - set_alarm_pattern
  #     - restart_application
  #   public_key_ed25519: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"
  #   fingerprint: "SHA256:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
  #   created_at: "2024-12-13T00:00:00Z"
  #   expires_at: "2025-12-13T00:00:00Z"
  #   enabled: true
  #   added_by: admin_user
  #
  # - signer_id: pharmacist.jones@hospital.eu
  #   full_name: Sarah Jones, PharmD
  #   role: Pharmacist
  #   professional_license: RPh-98765-NY
  #   permissions:
  #     - set_threshold
  #   public_key_ed25519: "b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3"
  #   fingerprint: "SHA256:b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7"
  #   created_at: "2024-12-13T00:00:00Z"
  #   expires_at: "2025-06-13T00:00:00Z"
  #   enabled: true
  #   added_by: dr.jane.smith@hospital.eu

# Available Permissions:
# - set_threshold: Change alarm temperature thresholds
# - set_alarm_pattern: Change LED/buzzer alarm patterns
# - set_display_screen: Change display screen
# - flush_storage: Trigger database flush
# - restart_application: Restart the application
# - get_device_info: Query device information
# - get_sensor_status: Query sensor status

# Security Notes:
# - Private keys MUST NEVER be transmitted over network
# - Private keys should be stored on hardware security tokens (YubiKey, Nitrokey)
# - Public keys can be freely distributed (they're in this file)
# - Revoke access by setting enabled: false (takes effect within 10 seconds)
# - Set expires_at for temporary access grants
# - All configuration changes are logged to audit trail with signature
