[package]
name = "fiber"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
chrono = { version = "0.4", features = ["clock", "serde"] }
rusqlite = { version = "0.37", features = ["chrono", "bundled"] } # you already have this
embedded-ttf = "0.2"

# NEW (for real HAL, not used in tests):
rppal = "0.22.1"
serialport = { version = "4", default-features = false }
embedded-graphics = "0.8.1"
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"
rouille = "3.6"
i2cdev = "0.6"

# Audit system (Phase 1)
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

# Blockchain (Phase 2)
ed25519-dalek = "2.0"
rand = "0.8"

# WebSocket & Dashboard (Phase 4)
tokio = { version = "1.35", features = ["full"] }
tokio-tungstenite = "0.21"

[dev-dependencies]
tempfile = "3.10"