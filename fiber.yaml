# Fiber Configuration File
# All 8 DS18B20 sensor lines configured
#
# Each sensor is mapped to:
#  - io_pin (0-7): Corresponds to IO0-IO7 on DS2482 bridge and P0-P7 pins
#  - led_index (0-7): Corresponding LED on the front panel
#
# Sensors in standby until physically connected.
# Update ROM codes as you connect sensors to each line.
#
# ============================================================
# DISCOVERY: Find connected sensors
# ============================================================
# ssh root@<CM4_IP>
# for i in 1 2 3 4 5 6 7 8; do
#   ls /sys/bus/w1/devices/w1_bus_master$i/ | grep "^28-"
# done
#
# ============================================================
# SENSOR STATUS REFERENCE
# ============================================================
# Currently detected:
#   io_pin 3 (w1_bus_master4): 28-000000b372c1
#
# To add: Connect DS18B20 to P3, discovery will auto-detect
# ============================================================

sensors:
  # === ALL 8 LINES - READY FOR HOT-PLUG ===
  # ROM codes are auto-discovered - no need to specify
  # Just configure the line (io_pin) where the sensor will be connected
  # When you plug a sensor into a line, it will auto-detect and display

  - id: 1
    label: "Therm 1"
    kind: ds18b20
    i2c_path: /dev/i2c-10
    io_pin: 0
    led_index: 0
    warning_low: 15.0
    warning_high: 30.0
    critical_low: 5.0
    critical_high: 40.0
    hysteresis: 1.0

