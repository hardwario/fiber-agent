build:aarch64-dev-platform:
  stage: build
  image: rust:1.94-bookworm
  rules:
    - !reference [.rules:only_tags, rules]
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
    PKG_CONFIG_ALLOW_CROSS: "1"
    PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
  before_script:
    - dpkg --add-architecture arm64
    - apt-get update
    - apt-get install -y --no-install-recommends
        gcc-aarch64-linux-gnu libc6-dev-arm64-cross pkg-config
        libssl-dev:arm64 libdbus-1-dev:arm64
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - echo "Stamping Cargo.toml with version ${VERSION}"
    - sed -i -E "0,/^version = \".*\"$/s//version = \"${VERSION}\"/" Cargo.toml
    - cargo build --release --target aarch64-unknown-linux-gnu --features dev-platform
    - cp target/aarch64-unknown-linux-gnu/release/fiber_app fiber_app
    - 'curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN"
        --upload-file fiber_app
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/fiber-agent/${CI_COMMIT_TAG}/fiber_app"'
  artifacts:
    name: "fiber_app-${CI_COMMIT_TAG}"
    paths:
      - fiber_app
    expire_in: 6 months
  cache:
    key:
      files:
        - Cargo.lock
        - rust-toolchain.toml
    paths:
      - .cargo/registry/index
      - .cargo/registry/cache
      - target/

release:dev-platform:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:aarch64-dev-platform
      artifacts: false
  rules:
    - !reference [.rules:only_tags, rules]
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Auto-built aarch64 binary with --features dev-platform."
    assets:
      links:
        - name: "fiber_app"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/fiber-agent/${CI_COMMIT_TAG}/fiber_app"
          link_type: package

# Mirrors the binary to a GitHub Release on hardwario/fiber-agent.
# Manual: trigger AFTER running scripts/publish-to-github.sh, which pushes
# the tag to the GitHub mirror. Requires GH_TOKEN (CI/CD variable, masked +
# protected) — a GitHub PAT with `repo` scope.
release:github-mirror:
  stage: release
  image: alpine:latest
  needs:
    - job: build:aarch64-dev-platform
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: true
  variables:
    GH_REPO: hardwario/fiber-agent
  before_script:
    - apk add --no-cache github-cli
  script:
    - |
      if gh release view "$CI_COMMIT_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
        echo "GitHub release $CI_COMMIT_TAG exists — uploading asset (clobber)..."
        gh release upload "$CI_COMMIT_TAG" ./fiber_app \
          --repo "$GH_REPO" --clobber
      else
        echo "Creating GitHub release $CI_COMMIT_TAG..."
        gh release create "$CI_COMMIT_TAG" ./fiber_app \
          --repo "$GH_REPO" \
          --title "Release $CI_COMMIT_TAG" \
          --notes "Mirror of GitLab release $CI_COMMIT_TAG.

      Built from internal source at gitlab.hardwario.com/fiber-v2/application."
      fi
