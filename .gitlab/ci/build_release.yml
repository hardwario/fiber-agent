build:aarch64-dev-platform:
  stage: build
  image: rust:1.94-bookworm
  rules:
    - !reference [.rules:only_tags, rules]
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
    PKG_CONFIG_ALLOW_CROSS: "1"
    PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
  before_script:
    - dpkg --add-architecture arm64
    - apt-get update
    - apt-get install -y --no-install-recommends
        gcc-aarch64-linux-gnu pkg-config
        libssl-dev:arm64 libdbus-1-dev:arm64
  script:
    - cargo build --release --target aarch64-unknown-linux-gnu --features dev-platform
    - cp target/aarch64-unknown-linux-gnu/release/fiber_app fiber_app-aarch64-dev-platform
    - 'curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN"
        --upload-file fiber_app-aarch64-dev-platform
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/fiber-agent/${CI_COMMIT_TAG}/fiber_app-aarch64-dev-platform"'
  artifacts:
    name: "fiber_app-${CI_COMMIT_TAG}-aarch64-dev-platform"
    paths:
      - fiber_app-aarch64-dev-platform
    expire_in: 6 months
  cache:
    key:
      files:
        - Cargo.lock
        - rust-toolchain.toml
    paths:
      - .cargo/registry/index
      - .cargo/registry/cache
      - target/

release:dev-platform:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:aarch64-dev-platform
      artifacts: false
  rules:
    - !reference [.rules:only_tags, rules]
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Auto-built aarch64 binary with --features dev-platform."
    assets:
      links:
        - name: "fiber_app-aarch64-dev-platform"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/fiber-agent/${CI_COMMIT_TAG}/fiber_app-aarch64-dev-platform"
          link_type: package
