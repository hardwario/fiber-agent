# application/.gitlab/ci/semrel.yml
semantic-release:
  stage: release
  image: node:20-bookworm
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "dev"'
  variables:
    GITLAB_TOKEN: $SEMREL_GITLAB_TOKEN
  before_script:
    - npm install --no-save semantic-release @semantic-release/exec @semantic-release/gitlab @semantic-release/commit-analyzer @semantic-release/release-notes-generator
  script:
    - npx semantic-release
