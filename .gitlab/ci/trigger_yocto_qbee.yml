trigger-yocto-qbee:
  stage: trigger
  image: curlimages/curl:latest
  needs:
    - job: prep_tags
      artifacts: true
  script:
    - |
      echo "→ Triggering downstream pipeline on ref: $TARGET_REF"
      echo "  VERSION=$VERSION, FOLDER=$FOLDER, BRANCH=$BRANCH"
      curl -v -X POST --fail \
            -F token="$SYSTEM_TRIGGER_TOKEN" \
            -F ref="$TARGET_REF" \
            -F "variables[FOLDER]=$FOLDER" \
            -F "variables[TAG]=$VERSION" \
            -F "variables[BRANCH]=$BRANCH" \
            "https://gitlab.hardwario.com/api/v4/projects/$SYSTEM_PROJECT_ID/trigger/pipeline"
  rules:
    - !reference [.rules:only_tags, rules]
  variables:
    TARGET_REF: "$CI_DEFAULT_BRANCH"