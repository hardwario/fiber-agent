.rules:only_tags:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: never

.rules:no_tags:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success

.rules:no_tags_push_protected:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_PROTECTED == "true"'
      when: on_success
    - when: never